<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Comparativo Motor · Teste</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0b1020; color: #e8eefc; padding: 24px; }
    h1 { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
    .sub { font-size: 12px; color: #64748b; margin-bottom: 20px; }
    .card { background: #121a33; border: 1px solid #22305f; border-radius: 10px; padding: 16px; margin-bottom: 14px; }
    .card-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: #64748b; margin-bottom: 10px; }
    pre { font-size: 12px; color: #93c5fd; white-space: pre-wrap; word-break: break-all; }
    .param { margin-bottom: 12px; }
    .param-name { font-size: 13px; font-weight: 600; color: #f0abfc; margin-bottom: 4px; }
    .point { display: inline-block; background: #1e3a5f; border-radius: 6px; padding: 3px 9px; margin: 2px 3px; font-size: 12px; color: #bfdbfe; }
    .err { color: #f87171; }
    .ok  { color: #86efac; }
    .muted { color: #64748b; font-size: 12px; }
  </style>
</head>
<body>

<h1>comparativo-motor.js · Teste</h1>
<div class="sub">lerSerieOmbro — patient_id fixo · requer sessão activa</div>

<div class="card" id="status-card">
  <div class="card-title">Estado</div>
  <div id="status" class="muted">A inicializar…</div>
</div>

<div id="resultado"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module">
  import { lerSerieOmbro } from './comparativo-motor.js';

  const PATIENT_ID = '163fe5dc-a34f-4c80-8f01-5db0d63f759c';

  window.SUPABASE_URL      = 'https://nxfnzzcuqzxmzsihbrtp.supabase.co';
  window.SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im54Zm56emN1cXp4bXpzaWhicnRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAyODg3MjEsImV4cCI6MjA4NTg2NDcyMX0.Vk3-Aiq13fNMQWDyicHWErERWB5JBC9wZQ7OnVLmCnA';
  window.sb = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);

  const statusEl    = document.getElementById('status');
  const resultadoEl = document.getElementById('resultado');

  async function run() {
    const { data: { user } } = await window.sb.auth.getUser();
    if (!user) {
      statusEl.innerHTML = '<span class="err">Sem sessão. Faz login em <a href="/" style="color:#93c5fd">gc.joaomorais.pt</a> e volta aqui.</span>';
      return;
    }
    statusEl.innerHTML = '<span class="ok">Sessão activa · ' + user.email + '</span>';

    statusEl.innerHTML += '<br><span class="muted">A carregar séries para ' + PATIENT_ID + '…</span>';

    let series;
    try {
      series = await lerSerieOmbro(PATIENT_ID);
    } catch (e) {
      statusEl.innerHTML += '<br><span class="err">Erro: ' + e.message + '</span>';
      return;
    }

    const params = Object.keys(series);
    statusEl.innerHTML += '<br><span class="ok">OK — ' + params.length + ' série(s) com dados</span>';

    if (!params.length) {
      resultadoEl.innerHTML = '<div class="card"><div class="card-title">Resultado</div><div class="muted">Nenhuma série com dados para este doente.</div></div>';
      return;
    }

    let html = '<div class="card"><div class="card-title">Séries extraídas</div>';
    for (const param of params) {
      const pontos = series[param];
      html += '<div class="param">';
      html += '<div class="param-name">' + param + ' <span class="muted">(' + pontos.length + ' ponto' + (pontos.length !== 1 ? 's' : '') + ')</span></div>';
      html += pontos.map(p => '<span class="point">' + p.data + ' → ' + p.valor + '</span>').join('');
      html += '</div>';
    }
    html += '</div>';

    html += '<div class="card"><div class="card-title">JSON completo</div><pre>' + JSON.stringify(series, null, 2) + '</pre></div>';
    resultadoEl.innerHTML = html;
  }

  run().catch(e => {
    statusEl.innerHTML = '<span class="err">Excepção: ' + e.message + '</span>';
  });
</script>
</body>
</html>
