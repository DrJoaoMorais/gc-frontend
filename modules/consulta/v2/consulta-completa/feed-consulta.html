<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feed Consulta — GC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>

    window.SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im54Zm56emN1cXp4bXpzaWhicnRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAyODg3MjEsImV4cCI6MjA4NTg2NDcyMX0.Vk3-Aiq13fNMQWDyicHWErERWB5JBC9wZQ7OnVLmCnA";
    window.sb = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
  </script>
  <style>
    /* ===== TOPBAR NAVY ===== */
    .fc-topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      height: 52px;
      background: var(--cc-navy);
      display: flex; align-items: center; gap: 10px;
      padding: 0 18px;
    }
    .fc-topbar-nome {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600; font-size: 19px; color: #fff;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .fc-topbar-data {
      font-size: 12px; color: rgba(255,255,255,0.5);
      border: 1px solid rgba(255,255,255,0.2); border-radius: 5px;
      padding: 2px 8px; white-space: nowrap; flex-shrink: 0;
    }
    .fc-topbar-sp { flex: 1; min-width: 0; }
    .fc-topbar-acoes { display: flex; align-items: center; gap: 7px; flex-shrink: 0; }
    .fc-btn {
      font: 500 13px/1 'Outfit', sans-serif;
      border-radius: 7px; padding: 7px 13px;
      cursor: pointer; border: 1px solid rgba(255,255,255,0.22);
      background: transparent; color: rgba(255,255,255,0.82);
      transition: all .15s; white-space: nowrap;
    }
    .fc-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .fc-btn:disabled { opacity: .45; cursor: default; }
    .fc-btn-prim { background: #15803d; border-color: #15803d; color: #fff; }
    .fc-btn-prim:hover { background: #136a33; border-color: #136a33; }
    .fc-topbar-estado { font-size: 12px; color: rgba(255,255,255,0.6); white-space: nowrap; }
    .fc-topbar-estado.ok   { color: #86efac; }
    .fc-topbar-estado.erro { color: #fca5a5; }

    /* ===== BARRA ANTECEDENTES ===== */
    .fc-antec-bar {
      position: fixed; top: 52px; left: 0; right: 0; z-index: 199;
      background: #fff; border-bottom: 1px solid var(--cc-linha);
    }
    .fc-antec-inner {
      padding: 6px 18px;
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; overflow: hidden;
      white-space: nowrap; min-height: 36px;
    }
    .fc-antec-item {
      overflow: hidden; text-overflow: ellipsis;
      color: var(--cc-suave); max-width: 260px; flex-shrink: 1;
    }
    .fc-antec-lbl {
      font-size: 10px; font-weight: 700; letter-spacing: .05em;
      text-transform: uppercase; color: var(--cc-ténue); margin-right: 3px;
    }
    .fc-antec-sep { color: var(--cc-linha); font-size: 14px; flex-shrink: 0; }
    .fc-antec-vazio { font-size: 12px; color: var(--cc-ténue); font-style: italic; }
    .fc-badge {
      display: inline-flex; align-items: center;
      font-size: 11px; font-weight: 600; padding: 2px 9px;
      border-radius: 5px; white-space: nowrap; flex-shrink: 0;
    }
    .fc-badge-red   { background: #fef2f2; color: #b91c1c; border: 1px solid #fca5a5; }
    .fc-badge-ambar { background: #fffbeb; color: #92400e; border: 1px solid #fde68a; }
    .fc-badge-azul  { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }
    .fc-antec-edit  {
      margin-left: auto; flex-shrink: 0;
      font-size: 11px; color: var(--cc-ténue);
      text-decoration: none; white-space: nowrap;
    }
    .fc-antec-edit:hover { color: var(--cc-azul); }

    /* ===== BARRA PACEMAKER (condicional) ===== */
    .fc-alerta-critico {
      display: none;
      position: fixed; left: 0; right: 0; z-index: 198;
      background: #fef2f2; border-bottom: 2px solid #fca5a5;
      padding: 7px 18px; font-size: 13px; font-weight: 600; color: #b91c1c;
    }
    .fc-alerta-critico.visivel { display: block; }

    /* ===== PÁGINA ===== */
    .fc-page { padding-top: 96px; /* recalculado via JS */ }
    .fc-banner-wrap { border-bottom: 1px solid #fde68a; }

    /* ===== LAYOUT 2 COLUNAS ===== */
    .fc-layout {
      display: grid;
      grid-template-columns: 65fr 35fr;
      gap: 14px;
      padding: 14px 16px 80px;
      max-width: 1440px;
      margin: 0 auto;
      align-items: start;
    }
    .fc-col-main { display: flex; flex-direction: column; gap: 12px; min-width: 0; }
    .fc-col-side {
      display: flex; flex-direction: column; gap: 12px;
      position: sticky; top: 104px; /* recalculado via JS */
      align-self: start; min-width: 0;
      max-height: calc(100vh - 108px);
      overflow-y: auto;
    }

    /* ===== QUILL OVERRIDES ===== */
    .ql-toolbar.ql-snow {
      border: 1px solid var(--cc-linha); border-bottom: none;
      border-radius: 8px 8px 0 0;
      background: var(--cc-fundo); font-family: 'Outfit', sans-serif;
    }
    .ql-container.ql-snow {
      border: 1px solid var(--cc-linha); border-radius: 0 0 8px 8px;
      font-family: 'Outfit', sans-serif; font-size: 15px;
    }
    .ql-editor { min-height: 150px; line-height: 1.7; color: var(--cc-texto); padding: 14px 16px; }
    .ql-editor.ql-blank::before { color: var(--cc-ténue); font-style: italic; left: 16px; }
    .ql-snow .ql-toolbar button:hover .ql-stroke,
    .ql-snow .ql-toolbar button.ql-active .ql-stroke { stroke: var(--cc-azul); }
    .ql-snow .ql-toolbar button:hover .ql-fill,
    .ql-snow .ql-toolbar button.ql-active .ql-fill { fill: var(--cc-azul); }

    /* ===== SNIPPETS HDA ===== */
    .fc-snips { display: flex; gap: 5px; margin-top: 10px; flex-wrap: wrap; }
    .fc-snip {
      background: var(--cc-fundo); border: 1px solid var(--cc-linha);
      border-radius: 5px; padding: 4px 10px; font-size: 11px;
      color: var(--cc-suave); cursor: pointer; transition: all .15s;
    }
    .fc-snip:hover { background: var(--cc-azul); color: #fff; border-color: var(--cc-azul); }

    /* ===== RESUMO EXAME (coluna direita) ===== */
    .fc-resumo-linha {
      display: flex; justify-content: space-between; align-items: center;
      padding: 7px 0; border-top: 1px solid var(--cc-linha); font-size: 13px;
    }
    .fc-resumo-linha:first-child { border-top: none; padding-top: 0; }
    .fc-resumo-rot { color: var(--cc-suave); }
    .fc-resumo-val { font-weight: 600; color: var(--cc-texto); }
    .fc-resumo-v { color: #15803d; }
    .fc-resumo-a { color: #b45309; }
    .fc-resumo-r { color: #b91c1c; }

    /* ===== HDA — GUIÃO HORIZONTAL COLAPSÁVEL ===== */
    .fc-guiao-bar { background: #0f2d52; padding: 10px 14px; display: flex; align-items: flex-start; gap: 9px; cursor: pointer; }
    .fc-guiao-ico { font-size: 14px; color: #93c5fd; flex-shrink: 0; margin-top: 2px; }
    .fc-guiao-chev { font-size: 14px; color: rgba(255,255,255,.5); flex-shrink: 0; transition: transform .2s; }
    .fc-guiao-conteudo { flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .fc-guiao-linha { font-size: 11px; color: rgba(255,255,255,.92); line-height: 1.5; }
    .fc-guiao-k { color: #93c5fd; font-weight: 500; }
    .fc-guiao-redflag { color: #fca5a5; }
    .fc-guiao-redflag .fc-guiao-k { color: #fca5a5; }
    .fc-guiao-fechado { display: none; align-items: center; gap: 8px; font-size: 11px; color: rgba(255,255,255,.7); }
    .fc-guiao-hint { font-size: 10px; color: rgba(255,255,255,.45); }
    /* estado colapsado */
    .fc-guiao-bar.fc-guiao-collapsed { padding: 7px 14px; align-items: center; }
    .fc-guiao-bar.fc-guiao-collapsed .fc-guiao-conteudo { display: none; }
    .fc-guiao-bar.fc-guiao-collapsed .fc-guiao-fechado { display: flex; }
    .fc-guiao-bar.fc-guiao-collapsed .fc-guiao-chev { transform: rotate(180deg); }
    .fc-quill-wrap { display: flex; flex-direction: column; min-width: 0; }
    .fc-quill-wrap .ql-toolbar.ql-snow { border-radius: 0; border-left: none; border-right: none; border-top: none; }
    .fc-quill-wrap .ql-container.ql-snow { border-radius: 0; border: none; }
    .fc-obj-wrap { padding: 8px 14px; border-top: 0.5px solid var(--cc-linha); background: var(--cc-fundo); border-radius: 0 0 8px 8px; }
    .fc-obj-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--cc-ténue); display: block; margin-bottom: 4px; }
    .fc-obj-textarea { width: 100%; border: 1px solid var(--cc-linha); border-radius: 6px; padding: 6px 10px; font-size: 13px; font-family: 'Outfit', sans-serif; color: var(--cc-texto); background: #fff; resize: none; line-height: 1.5; box-sizing: border-box; }
    .fc-obj-textarea:focus { outline: none; border-color: var(--cc-azul); }
    .fc-obj-textarea::placeholder { color: var(--cc-ténue); font-style: italic; }

    /* ===== STATUS LOADING ===== */
    #fc-loading {
      text-align: center; color: var(--cc-suave); font-size: 15px;
      padding: 60px 0;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 860px) {
      .fc-layout { grid-template-columns: 1fr; }
      .fc-col-side { position: static; max-height: none; overflow: visible; }
      .fc-topbar-nome { font-size: 16px; }
    }
  </style>
</head>
<body>

  <!-- TOPBAR NAVY -->
  <header class="fc-topbar">
    <span class="fc-topbar-nome" id="fc-nome">A carregar…</span>
    <span class="fc-topbar-data" id="fc-data"></span>
    <span class="fc-topbar-sp"></span>
    <div class="fc-topbar-acoes">
      <button class="fc-btn" id="btn-rc" disabled title="Rel. Consulta — em construção">Rel. Consulta</button>
      <button class="fc-btn" id="btn-rm" disabled title="Rel. Médico — em construção">Rel. Médico</button>
      <button class="fc-btn fc-btn-prim" id="btn-gravar">Gravar HDA</button>
      <span class="fc-topbar-estado" id="fc-estado"></span>
    </div>
  </header>

  <!-- BARRA ANTECEDENTES -->
  <div class="fc-antec-bar" id="fc-antec-bar">
    <div class="fc-antec-inner" id="fc-antec-inner">
      <span class="fc-antec-vazio">A carregar antecedentes…</span>
    </div>
  </div>

  <!-- BARRA PACEMAKER (aparece quando activo) -->
  <div class="fc-alerta-critico" id="fc-alerta-critico">
    ⚠️ PACEMAKER — verificar compatibilidade antes de qualquer procedimento
  </div>

  <!-- PÁGINA -->
  <div class="fc-page" id="fc-page">

    <div id="fc-loading">A carregar consulta…</div>

    <div class="fc-layout" id="fc-layout" style="display:none">

      <!-- COLUNA PRINCIPAL (65%) -->
      <div class="fc-col-main">

        <!-- HDA -->
        <div class="cc-bloco">
          <div class="cc-bloco-head">
            <span class="cc-bloco-icon">📝</span>
            <span class="cc-bloco-titulo">História da Doença Actual</span>
            <span class="cc-badge" style="margin-left:auto">Quill 2.0</span>
          </div>
          <div class="cc-acc-body" style="padding:0">
            <div id="fc-guiao"></div>
            <div class="fc-quill-wrap">
              <div id="hda-editor"></div>
              <div class="fc-snips" id="fc-snips" style="padding:8px 14px"></div>
              <div class="fc-obj-wrap">
                <label class="fc-obj-label" for="fc-objectivos">Objectivos</label>
                <textarea id="fc-objectivos" class="fc-obj-textarea" placeholder="Objectivos da consulta…" rows="2"></textarea>
              </div>
            </div>
          </div>
        </div>

        <!-- Exame objectivo -->
        <div class="cc-bloco cc-acc-bloco">
          <div class="cc-bloco-head cc-acc-head" data-acc="exame">
            <span class="cc-bloco-icon">⚕️</span>
            <span class="cc-bloco-titulo">Exame Objectivo</span>
            <span class="cc-chev" style="margin-left:auto">⌄</span>
          </div>
          <div class="cc-acc-body" id="bloco-exame"></div>
        </div>

        <!-- Diagnóstico -->
        <div class="cc-bloco cc-acc-bloco">
          <div class="cc-bloco-head cc-acc-head" data-acc="diag">
            <span class="cc-bloco-icon">🏷️</span>
            <span class="cc-bloco-titulo">Diagnóstico</span>
            <span class="cc-chev" style="margin-left:auto">⌄</span>
          </div>
          <div class="cc-acc-body" id="bloco-diag"></div>
        </div>

        <!-- Prescrição -->
        <div class="cc-bloco cc-acc-bloco">
          <div class="cc-bloco-head cc-acc-head" data-acc="trat">
            <span class="cc-bloco-icon">💊</span>
            <span class="cc-bloco-titulo">Prescrição</span>
            <span class="cc-chev" style="margin-left:auto">⌄</span>
          </div>
          <div class="cc-acc-body" id="bloco-trat"></div>
        </div>

      </div>

      <!-- COLUNA DIREITA STICKY (35%) -->
      <div class="fc-col-side" id="fc-col-side">

        <!-- Objectivos & Protocolo -->
        <div class="cc-bloco">
          <div class="cc-bloco-head">
            <span class="cc-bloco-icon">🎯</span>
            <span class="cc-bloco-titulo">Objectivos &amp; Protocolo</span>
          </div>
          <div class="cc-acc-body" id="bloco-protocolo"></div>
        </div>

        <!-- Resumo exame (métricas chave) -->
        <div class="cc-bloco" id="bloco-resumo-wrap">
          <div class="cc-bloco-head">
            <span class="cc-bloco-icon">📊</span>
            <span class="cc-bloco-titulo">Resumo do Exame</span>
          </div>
          <div class="cc-acc-body" id="bloco-resumo"></div>
        </div>

      </div>
    </div>
  </div><!-- /fc-page -->

  <script type="module">
    import { preencherExame } from './cc-feed.js';
    import { buildGuiaoHTML, initGuiao } from './guiao-anamnese.js';

    async function carregarConsulta({ consultationId, patientId }) {
      const sb = window.sb;
      if (!sb) throw new Error('Supabase (window.sb) não inicializado.');

      /* --- 1. Consulta + HDA --- */
      const { data: consulta, error: eC } = await sb
        .from('consultations')
        .select('id, report_date, hda, objectives, plan_text, author_display_name')
        .eq('id', consultationId)
        .single();
      if (eC) throw eC;

      /* --- 2. Diagnósticos (com system, code, label do catálogo) --- */
      const { data: diagRows, error: eD } = await sb
        .from('consultation_diagnoses')
        .select('diagnosis_id, diagnoses_catalog ( system, code, label )')
        .eq('consultation_id', consultationId);
      if (eD) throw eD;
      const diagnosticos = (diagRows || []).map(r => ({
        system: r.diagnoses_catalog?.system || 'ICD-9',
        code: r.diagnoses_catalog?.code || '',
        label: r.diagnoses_catalog?.label || '(sem descrição)',
      }));

      /* --- 3. Tratamentos (com qty) --- */
      const { data: tratRows, error: eT } = await sb
        .from('consultation_treatments')
        .select('qty, treatments_catalog ( code, label )')
        .eq('consultation_id', consultationId);
      if (eT) throw eT;
      const tratamentos = (tratRows || []).map(r => ({
        code: r.treatments_catalog?.code || '',
        label: r.treatments_catalog?.label || '(sem descrição)',
        qty: r.qty ?? 1,
      }));

      /* --- 4. Exames objectivos (jsonb), mais recente primeiro --- */
      const { data: examRows, error: eE } = await sb
        .from('consultation_assessments')
        .select('id, assessment_type, assessment_side, assessment_date, data, created_at')
        .eq('consultation_id', consultationId)
        .order('assessment_date', { ascending: false })
        .order('created_at', { ascending: false });
      if (eE) throw eE;
      const exames = examRows || [];

      /* --- 5. Protocolo da consulta (cabeçalho + fase pré-escrita) --- */
      const { data: protRows, error: eP } = await sb
        .from('consultation_protocols')
        .select('id, protocol_id, phase_id, data, protocols_catalog ( region, name, kind ), protocol_phases ( phase_order, name, anchor_from, anchor_to, data )')
        .eq('consultation_id', consultationId);
      if (eP) throw eP;
      const pr = (protRows || [])[0] || null;
      const protocolo = pr ? {
        id:     pr.id,
        nome:   pr.protocols_catalog?.name   || '',
        regiao: pr.protocols_catalog?.region || '',
        tipo:   pr.protocols_catalog?.kind   || '',
        fase: pr.protocol_phases ? {
          ordem:      pr.protocol_phases.phase_order,
          nome:       pr.protocol_phases.name,
          ancora_de:  pr.protocol_phases.anchor_from,
          ancora_ate: pr.protocol_phases.anchor_to,
          dados: { ...(pr.protocol_phases.data || {}), ...(pr.data || {}) },
        } : null,
      } : null;

      return { consulta, diagnosticos, tratamentos, exames, protocolo };
    }

    const params = new URLSearchParams(window.location.search);
    const PATIENT_ID  = params.get('patientId') || '';
    const CONSULTA_ID = params.get('consultId') || '';

    const SNIPPETS = [
      ['+ EVA',        'Dor EVA '],
      ['+ Rigidez',    'Rigidez matinal '],
      ['+ Parestesias','Parestesias em '],
      ['+ Limitação',  'Limitação funcional para '],
      ['+ Antecedentes','Antecedentes: '],
      ['+ Medicação',  'Medicação actual: '],
    ];

    let quill = null;

    /* -------- offsets dinâmicos -------- */
    function calcOffset() {
      const tb = document.getElementById('fc-topbar')?.offsetHeight || 52;
      const ab = document.getElementById('fc-antec-bar')?.offsetHeight || 36;
      const ac = document.getElementById('fc-alerta-critico');
      const acH = ac?.classList.contains('visivel') ? (ac.offsetHeight || 0) : 0;
      return tb + ab + acH;
    }

    function aplicarOffsets() {
      const off = calcOffset();
      const page = document.getElementById('fc-page');
      if (page) page.style.paddingTop = off + 'px';
      const side = document.getElementById('fc-col-side');
      if (side) side.style.top = (off + 8) + 'px';
      const side_maxH = `calc(100vh - ${off + 12}px)`;
      if (side) side.style.maxHeight = side_maxH;
    }

    /* -------- boot -------- */
    async function boot() {
      const sb = window.sb;
      if (!sb) { status('⚠️ Supabase não inicializado.'); return; }
      if (!PATIENT_ID || !CONSULTA_ID) { status('⚠️ Parâmetros em falta. Abre este feed a partir da ficha do doente.'); return; }

      const { data: u, error: eu } = await sb.auth.getUser();
      if (eu || !u?.user) { status('⚠️ Sem sessão. Faz login no GC neste browser e recarrega.'); return; }

      /* carregar consulta + doente em paralelo */
      const [consultaData, pacienteRes] = await Promise.all([
        carregarConsulta({ consultationId: CONSULTA_ID, patientId: PATIENT_ID }),
        sb.from('patients')
          .select('full_name, dob, antecedentes_pessoais, antecedentes_medicamentosos, antecedentes_cirurgicos, alertas')
          .eq('id', PATIENT_ID)
          .single(),
      ]);

      /* topbar: nome + data */
      if (!pacienteRes.error && pacienteRes.data) {
        const p = pacienteRes.data;
        document.getElementById('fc-nome').textContent = p.full_name || 'Doente';
        renderAntecedentes(p);
      }

      const { consulta, diagnosticos, tratamentos, exames, protocolo } = consultaData;

      if (consulta.report_date) {
        const [a, m, d] = consulta.report_date.split('-');
        document.getElementById('fc-data').textContent = `${d}/${m}/${a}`;
      }

      /* mostrar layout */
      document.getElementById('fc-loading').style.display = 'none';
      document.getElementById('fc-layout').style.display = 'grid';

      /* HDA → Quill */
      iniciarQuill(consulta.hda || '');

      /* Guião de anamnese */
      document.getElementById('fc-guiao').innerHTML = buildGuiaoHTML();
      initGuiao(quill);

      /* Objectivos */
      document.getElementById('fc-objectivos').value = consulta.objectives || '';

      /* blocos leitura */
      preencherExame(document.getElementById('bloco-exame'), exames);
      renderDiagnostico(document.getElementById('bloco-diag'), diagnosticos);
      renderTratamento(document.getElementById('bloco-trat'), tratamentos);
      renderProtocolo(document.getElementById('bloco-protocolo'), protocolo);
      renderResumo(exames);

      aplicarOffsets();
      bindAccordeons();
      bindGravar();
      bindBotoesRelatorio();
    }

    /* -------- Quill -------- */
    function iniciarQuill(hdaHTML) {
      quill = new Quill('#hda-editor', {
        theme: 'snow',
        placeholder: 'Escreve a história da doença actual…',
        modules: {
          toolbar: [
            [{ header: [1, 2, 3, false] }],
            [{ size: ['small', false, 'large', 'huge'] }],
            ['bold', 'italic', 'underline'],
            [{ list: 'ordered' }, { list: 'bullet' }],
            ['clean'],
          ],
        },
      });
      quill.clipboard.dangerouslyPasteHTML(hdaHTML);

      const snipsEl = document.getElementById('fc-snips');
      snipsEl.innerHTML = SNIPPETS
        .map(([r, t]) => `<span class="fc-snip" data-txt="${t.replace(/"/g, '&quot;')}">${r}</span>`)
        .join('');
      snipsEl.querySelectorAll('.fc-snip').forEach(s => {
        s.addEventListener('click', () => {
          const rng = quill.getSelection(true);
          const idx = rng ? rng.index : quill.getLength();
          quill.insertText(idx, s.dataset.txt, 'user');
          quill.setSelection(idx + s.dataset.txt.length, 0);
        });
      });
    }

    /* -------- Barra antecedentes -------- */
    function renderAntecedentes(p) {
      const alertas = p.alertas || {};
      const ac = document.getElementById('fc-alerta-critico');
      ac.classList.toggle('visivel', !!alertas.pacemaker);

      const partes = [];
      if (alertas.pacemaker) partes.push(`<span class="fc-badge fc-badge-red">🫀 PACEMAKER</span>`);
      if (alertas.alergias?.trim()) partes.push(`<span class="fc-badge fc-badge-ambar">⚠️ ${esc(alertas.alergias)}</span>`);
      if (alertas.outros?.trim())   partes.push(`<span class="fc-badge fc-badge-azul">ℹ️ ${esc(alertas.outros)}</span>`);

      if (partes.length) partes.push(`<span class="fc-antec-sep">·</span>`);

      if (p.antecedentes_pessoais?.trim())
        partes.push(`<span class="fc-antec-item"><span class="fc-antec-lbl">Pessoais</span>${esc(p.antecedentes_pessoais)}</span>`);
      if (p.antecedentes_medicamentosos?.trim()) {
        if (partes.length) partes.push(`<span class="fc-antec-sep">·</span>`);
        partes.push(`<span class="fc-antec-item"><span class="fc-antec-lbl">Medicação</span>${esc(p.antecedentes_medicamentosos)}</span>`);
      }
      if (p.antecedentes_cirurgicos?.trim()) {
        if (partes.length) partes.push(`<span class="fc-antec-sep">·</span>`);
        partes.push(`<span class="fc-antec-item"><span class="fc-antec-lbl">Cirúrgicos</span>${esc(p.antecedentes_cirurgicos)}</span>`);
      }

      const editLink = `<a class="fc-antec-edit" href="./antecedentes.test.html" title="Editar antecedentes">editar ↗</a>`;
      const inner = document.getElementById('fc-antec-inner');
      inner.innerHTML = partes.length
        ? partes.join('') + editLink
        : `<span class="fc-antec-vazio">Sem antecedentes</span>${editLink}`;

      aplicarOffsets();
    }

    /* -------- Resumo exame (coluna direita) -------- */
    function renderResumo(exames) {
      const wrap = document.getElementById('bloco-resumo-wrap');
      const el   = document.getElementById('bloco-resumo');
      if (!exames?.length) { wrap.style.display = 'none'; return; }

      const ex = exames[0];
      const d  = ex.data || {};
      const linhas = [];

      /* EVA */
      if (d.eva) {
        const { rep, act, pic } = d.eva;
        const vals = [];
        if (rep != null && rep !== '') vals.push(`Rep. ${rep}/10`);
        if (act != null && act !== '') vals.push(`Act. ${act}/10`);
        if (pic != null && pic !== '') vals.push(`Pico ${pic}/10`);
        if (vals.length) {
          const max = Math.max(...[rep, act, pic].map(v => Number(v) || 0));
          linhas.push({ r: 'EVA', v: vals.join(' · '), c: max >= 7 ? 'r' : max >= 4 ? 'a' : 'v' });
        }
      }

      /* ROM */
      const rom = d.rom || {};
      const movs = [
        { ch: 'flex_a', rot: 'Flexão activa',    norm: 180 },
        { ch: 'abd_a',  rot: 'Abdução activa',   norm: 180 },
        { ch: 're_a',   rot: 'Rot. externa act.', norm: 90 },
        { ch: 'ri_a',   rot: 'Rot. interna act.', norm: 90 },
      ];
      movs.forEach(m => {
        const v = rom[m.ch];
        if (v == null || v === '') return;
        const pct = Math.round((Number(v) / m.norm) * 100);
        linhas.push({ r: m.rot, v: `${v}°`, c: pct >= 90 ? 'v' : pct >= 70 ? 'a' : 'r' });
      });

      /* Escalas */
      const esc_ = d.escalas || {};
      if (esc_.oss_score  != null && esc_.oss_score  !== '') {
        const n = Number(esc_.oss_score);
        linhas.push({ r: 'OSS', v: `${esc_.oss_score}/48`, c: n >= 40 ? 'v' : n >= 30 ? 'a' : 'r' });
      }
      if (esc_.ases_score != null && esc_.ases_score !== '')
        linhas.push({ r: 'ASES', v: `${esc_.ases_score}/100`, c: '' });
      if (esc_.dash_score != null && esc_.dash_score !== '')
        linhas.push({ r: 'DASH', v: `${esc_.dash_score}/100`, c: '' });

      if (!linhas.length) { wrap.style.display = 'none'; return; }

      const corCls = { v: 'fc-resumo-v', a: 'fc-resumo-a', r: 'fc-resumo-r', '': '' };
      el.innerHTML = linhas.map(l =>
        `<div class="fc-resumo-linha">
          <span class="fc-resumo-rot">${esc(l.r)}</span>
          <span class="fc-resumo-val ${corCls[l.c] || ''}">${esc(l.v)}</span>
        </div>`
      ).join('');
    }

    /* -------- Acordeões -------- */
    function bindAccordeons() {
      document.querySelectorAll('.cc-acc-head').forEach(h => {
        h.addEventListener('click', () => {
          h.closest('.cc-acc-bloco')?.classList.toggle('cc-collapsed');
        });
      });
    }

    /* -------- Gravar HDA -------- */
    function bindGravar() {
      document.getElementById('btn-gravar').addEventListener('click', async () => {
        if (!quill) return;
        const html = quill.root.innerHTML;
        diz('A gravar…', '');
        try {
          const objectives = document.getElementById('fc-objectivos')?.value || '';
          const { data, error } = await window.sb
            .from('consultations')
            .update({ hda: html, objectives })
            .eq('id', CONSULTA_ID)
            .select('id');
          if (error) throw error;
          if (!data?.length) throw new Error('Sem permissão (RLS).');
          diz('Gravado ✓', 'ok');
        } catch (e) {
          diz('Erro: ' + (e.message || e), 'erro');
        }
      });
    }

    function bindBotoesRelatorio() {
      document.getElementById('btn-rc').addEventListener('click', () =>
        alert('Relatório de Consulta — em construção'));
      document.getElementById('btn-rm').addEventListener('click', () =>
        alert('Relatório Médico — em construção'));
    }

    /* -------- renders simples (sem cc-feed.js) -------- */
    function renderExame(el, exames) {
      if (!exames?.length) { el.innerHTML = `<p class="cc-vazio">Sem exame objectivo registado.</p>`; return; }
      el.innerHTML = exames.map((ex, i) => {
        const tipo = ex.assessment_type || 'Exame';
        const lado = ex.assessment_side ? ` ${ex.assessment_side}` : '';
        const [a, m, d] = (ex.assessment_date || '').split('-');
        const data = d ? `${d}/${m}/${a}` : (ex.assessment_date || '');
        const dados = ex.data || {};
        const linhas = Object.entries(dados)
          .filter(([k]) => !['resumo','lado'].includes(k))
          .map(([k, v]) => v != null && v !== '' && !(typeof v === 'object' && !Object.keys(v).length)
            ? `<div style="font-size:13px;padding:4px 0;border-top:1px solid var(--cc-linha)"><span style="font-size:10px;font-weight:700;letter-spacing:.04em;color:var(--cc-ténue);text-transform:uppercase;margin-right:8px">${esc(k)}</span>${esc(typeof v === 'object' ? JSON.stringify(v) : String(v))}</div>`
            : '')
          .join('');
        return `<div style="border:1px solid var(--cc-linha);border-radius:10px;padding:14px 16px;margin-bottom:10px">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
            <span style="font-size:14px;font-weight:600;color:var(--cc-navy);text-transform:capitalize">${esc(tipo)}${esc(lado)}</span>
            <span style="font-size:11px;color:var(--cc-suave);border:1px solid var(--cc-linha);border-radius:6px;padding:2px 7px">${data}</span>
            ${i > 0 ? '<span style="font-size:11px;color:var(--cc-ténue)">registo anterior</span>' : ''}
          </div>
          ${linhas || '<p class="cc-vazio">Exame sem campos preenchidos.</p>'}
        </div>`;
      }).join('');
    }

    function renderDiagnostico(el, diagnosticos) {
      if (!diagnosticos?.length) { el.innerHTML = `<p class="cc-vazio">Sem diagnósticos.</p>`; return; }
      el.innerHTML = diagnosticos.map(d =>
        `<div class="cc-diag-chip">
          <span class="cc-diag-sis">${esc(d.system || 'ICD-9')}</span>
          <span class="cc-diag-code">${esc(d.code)}</span>
          <span class="cc-diag-label">${esc(d.label)}</span>
        </div>`
      ).join('');
    }

    function renderTratamento(el, tratamentos) {
      if (!tratamentos?.length) { el.innerHTML = `<p class="cc-vazio">Sem tratamentos prescritos.</p>`; return; }
      el.innerHTML = `<table class="cc-tabela">
        <thead><tr><th>Código</th><th>Tratamento</th><th>Qtd.</th></tr></thead>
        <tbody>${tratamentos.map(t =>
          `<tr>
            <td class="cc-trat-code">${esc(t.code)}</td>
            <td>${esc(t.label)}</td>
            <td class="cc-trat-qty">${esc(t.qty)}</td>
          </tr>`).join('')}
        </tbody></table>`;
    }

    function renderProtocolo(el, protocolo) {
      if (!protocolo?.fase) { el.innerHTML = `<p class="cc-vazio">Sem protocolo associado.</p>`; return; }
      const f = protocolo.fase;
      const d = f.dados || {};
      const semanas = (f.ancora_de != null && f.ancora_ate != null) ? `${f.ancora_de}–${f.ancora_ate} sem` : '';
      const lista = (arr, cls) => Array.isArray(arr) && arr.length
        ? `<ul style="margin:0 0 8px;padding-left:20px">${arr.map(x => `<li class="${cls}" style="font-size:13px;padding:2px 0">${esc(typeof x === 'object' ? (x.label || '') : x)}</li>`).join('')}</ul>`
        : '';
      el.innerHTML = `
        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">
          <span style="font-size:12px;font-weight:600;background:#e6f1fb;color:#042c53;border-radius:6px;padding:4px 10px">${esc(protocolo.nome)}</span>
          ${semanas ? `<span style="font-size:12px;background:var(--cc-fundo);border:1px solid var(--cc-linha);border-radius:6px;padding:4px 10px">${esc(semanas)}</span>` : ''}
          <span style="font-size:12px;background:var(--cc-fundo);border:1px solid var(--cc-linha);border-radius:6px;padding:4px 10px">Fase ${esc(String(f.ordem))} — ${esc(f.nome)}</span>
        </div>
        ${d.objetivos?.length ? `<p style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--cc-ténue);margin:0 0 4px">Objectivos</p>${lista(d.objetivos,'cc-prot-obj')}` : ''}
        ${d.contraindicacoes?.length ? `<p style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--cc-ténue);margin:8px 0 4px">Contraindicações</p>${lista(d.contraindicacoes,'cc-prot-contra')}` : ''}
        ${d.hep?.length ? `<p style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--cc-ténue);margin:8px 0 4px">HEP</p>${lista(d.hep,'cc-prot-hep')}` : ''}`;
    }

    /* -------- utilidades -------- */
    function status(msg) {
      document.getElementById('fc-loading').textContent = msg;
      aplicarOffsets();
    }

    function diz(txt, cls) {
      const e = document.getElementById('fc-estado');
      if (e) { e.textContent = txt; e.className = 'fc-topbar-estado ' + (cls || ''); }
    }

    function esc(s) {
      return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    aplicarOffsets();
    boot();
  </script>
</body>
</html>
